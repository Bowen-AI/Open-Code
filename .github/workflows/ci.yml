name: CI

on:
  push:
    branches: [main, master, develop, "open-code/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Fmt
        run: cargo fmt -p open-code-memory -p open-code-logic -- --check

      - name: Clippy
        run: cargo clippy -p open-code-memory -p open-code-logic -- -D warnings

      - name: Test Rust
        run: cargo test -p open-code-memory -p open-code-logic

      - name: Build Rust
        run: cargo build -p open-code-memory -p open-code-logic --release

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm install
        run: npm install

      - name: Install Linux Electron test display
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: E2E readiness matrix
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a npm run test:e2e:ci
          else
            npm run test:e2e:ci
          fi
