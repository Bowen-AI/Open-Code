[package]
name = "open-code-desktop"
version = "0.1.0"
description = "Logic-first Open Code desktop app"
authors = ["Open Code"]
edition = "2021"
license = "Apache-2.0"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
open-code-logic = { path = "../../../crates/open-code-logic" }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.135"
tauri = { version = "2", features = [] }

[features]
default = []
custom-protocol = ["tauri/custom-protocol"]
